<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title</title>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="lists">
                <p class="list">Chores</p>
            </div>

            <footer class="sidebar-footer">
                <button class="new-list-button">New list</button>
            </footer>
        </div>

        <div class="main-content">
            <div class="list-content">
                <h1 class="list-name">Chores</h1>

                <div class="tasks">
                    <div class="task">
                        <input type="checkbox">
                        <p class="task-name">Wash the dishes</p>
                        <p class="task-priority">!!</p>
                        <button class="task-delete-button">X</button>
                    </div>

                    <div class="task">
                        <input type="checkbox">
                        <p class="task-name">Vacuum the carpet</p>
                        <p class="task-priority">!</p>
                        <button class="task-delete-button">X</button>
                    </div>

                    <div class="task">
                        <input type="checkbox">
                        <p class="task-name">Wash the windows</p>
                        <p class="task-priority">!</p>
                        <button class="task-delete-button">X</button>
                    </div>
                </div>
            </div>

            <footer>
                <button class="new-task-button">New task</button>
            </footer>
        </div>
    </div>
</body>
</html>
