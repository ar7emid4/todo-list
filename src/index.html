<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title</title>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="lists">

            <footer class="sidebar-footer">

        </div>

        <div class="main-content">
            <div class="list-content">

                    </div>

                        <div class="task-menu">

                            <p class="task-name" data-priority="1" data-status="active">Vacuum the carpet</p>

                        </div>

                        <p class="task-description">
                            get the vacuum cleaner out of the closet, plug it in, vacuum the carpet
                        </p>
                    </div>

                    <div class="task-container">

                            <input type="checkbox">
